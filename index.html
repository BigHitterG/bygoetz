<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>By Goetz — Isometric Grid</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="world" aria-label="Interactive centered isometric plot grid">
      <svg
        class="iso-world"
        viewBox="0 0 1600 1000"
        role="application"
        aria-labelledby="iso-title iso-desc"
        preserveAspectRatio="xMidYMid slice"
      >
        <title id="iso-title">Centered isometric plot grid</title>
        <desc id="iso-desc">
          A centered nine-by-nine isometric world window with lighter surrounding plots. The selected plot is always centered, and illustrated plots keep their world coordinates as you move.
        </desc>
        <defs>
          <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="170%">
            <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#334155" flood-opacity="0.18" />
          </filter>
        </defs>
        <rect class="canvas" width="1600" height="1000" />
        <g id="grid" class="grid"></g>
      </svg>
    </main>

    <script>
      const svgNS = "http://www.w3.org/2000/svg";
      const grid = document.querySelector("#grid");
      const svg = document.querySelector(".iso-world");
      const center = { x: 800, y: 500 };
      const viewBox = { width: 1600, height: 1000 };
      const tile = { x: 300, y: 150 };
      const primaryRadius = 4;
      const renderPadding = Math.max(tile.x, tile.y) * 1.35;
      const plotArtworkScale = 0.72;
      let current = { q: 0, r: 0 };

      const plotIllustrations = new Map([
        ["0,0", { type: "dog", label: "A friendly dog sitting on plot 0, 0" }],
      ]);

      function plotKey(q, r) {
        return `${q},${r}`;
      }

      function plotToScreen(q, r) {
        return {
          x: center.x + (q - current.q - (r - current.r)) * (tile.x / 2),
          y: center.y + (q - current.q + (r - current.r)) * (tile.y / 2),
        };
      }

      function getVisibleViewBoxBounds() {
        const rect = svg.getBoundingClientRect();
        const viewportAspect = rect.width / rect.height;
        const viewBoxAspect = viewBox.width / viewBox.height;

        if (viewportAspect > viewBoxAspect) {
          const visibleWidth = viewBox.height * viewportAspect;
          const overflow = (visibleWidth - viewBox.width) / 2;

          return {
            minX: -overflow,
            maxX: viewBox.width + overflow,
            minY: 0,
            maxY: viewBox.height,
          };
        }

        const visibleHeight = viewBox.width / viewportAspect;
        const overflow = (visibleHeight - viewBox.height) / 2;

        return {
          minX: 0,
          maxX: viewBox.width,
          minY: -overflow,
          maxY: viewBox.height + overflow,
        };
      }

      function isDiamondVisible(x, y, bounds, padding = 0) {
        return (
          x + tile.x / 2 >= bounds.minX - padding &&
          x - tile.x / 2 <= bounds.maxX + padding &&
          y + tile.y / 2 >= bounds.minY - padding &&
          y - tile.y / 2 <= bounds.maxY + padding
        );
      }

      function isArtworkFullyVisible(x, y, bounds) {
        const halfWidth = 68 * plotArtworkScale;
        const top = y - tile.y * 0.28 - 72 * plotArtworkScale;
        const bottom = y - tile.y * 0.28 + 68 * plotArtworkScale;

        return (
          x - halfWidth >= bounds.minX &&
          x + halfWidth <= bounds.maxX &&
          top >= bounds.minY &&
          bottom <= bounds.maxY
        );
      }

      function isPrimaryPlot(q, r) {
        return (
          q >= current.q - primaryRadius &&
          q <= current.q + primaryRadius &&
          r >= current.r - primaryRadius &&
          r <= current.r + primaryRadius
        );
      }

      function diamondPoints(x, y) {
        return `${x},${y - tile.y / 2} ${x + tile.x / 2},${y} ${x},${y + tile.y / 2} ${x - tile.x / 2},${y}`;
      }

      function createSvgElement(tagName, attributes = {}) {
        const element = document.createElementNS(svgNS, tagName);
        Object.entries(attributes).forEach(([name, value]) => element.setAttribute(name, value));
        return element;
      }

      function moveTo(q, r) {
        current = { q, r };
        renderGrid();
      }

      function appendDog(parent, x, y, label) {
        const dog = createSvgElement("g", {
          class: "plot-artwork dog-artwork",
          transform: `translate(${x} ${y}) scale(${plotArtworkScale})`,
          role: "img",
          "aria-label": label,
        });

        dog.append(
          createSvgElement("ellipse", { class: "artwork-shadow", cx: "0", cy: "48", rx: "56", ry: "15" }),
          createSvgElement("path", { class: "dog-tail", d: "M46 4 C78 -8 82 -48 48 -50 C70 -34 61 -17 39 -14" }),
          createSvgElement("ellipse", { class: "dog-body", cx: "-3", cy: "11", rx: "54", ry: "42" }),
          createSvgElement("path", { class: "dog-chest", d: "M-33 -12 C-52 8 -48 41 -22 50 C-6 33 -8 4 -33 -12Z" }),
          createSvgElement("circle", { class: "dog-head", cx: "-41", cy: "-38", r: "31" }),
          createSvgElement("path", { class: "dog-ear", d: "M-64 -60 C-91 -48 -87 -11 -60 -2 C-50 -17 -50 -43 -64 -60Z" }),
          createSvgElement("path", { class: "dog-ear dog-ear-back", d: "M-25 -59 C-2 -45 -7 -13 -29 -3 C-37 -20 -38 -43 -25 -59Z" }),
          createSvgElement("ellipse", { class: "dog-muzzle", cx: "-52", cy: "-29", rx: "18", ry: "13" }),
          createSvgElement("circle", { class: "dog-nose", cx: "-68", cy: "-32", r: "5" }),
          createSvgElement("circle", { class: "dog-eye", cx: "-49", cy: "-48", r: "4" }),
          createSvgElement("path", { class: "dog-smile", d: "M-62 -23 Q-56 -17 -48 -23" }),
          createSvgElement("path", { class: "dog-leg", d: "M-37 31 C-48 39 -50 61 -34 63 C-21 62 -22 44 -17 31Z" }),
          createSvgElement("path", { class: "dog-leg", d: "M18 30 C9 42 12 63 28 63 C42 62 39 43 47 31Z" }),
          createSvgElement("ellipse", { class: "dog-paw", cx: "-35", cy: "62", rx: "15", ry: "7" }),
          createSvgElement("ellipse", { class: "dog-paw", cx: "31", cy: "62", rx: "15", ry: "7" }),
          createSvgElement("path", { class: "dog-collar", d: "M-55 -10 C-42 -2 -24 -3 -12 -12" })
        );

        parent.appendChild(dog);
      }

      function appendIllustration(parent, illustration, x, y) {
        if (illustration.type === "dog") appendDog(parent, x, y - tile.y * 0.28, illustration.label);
      }

      function renderGrid() {
        grid.replaceChildren();
        const visiblePlots = [];
        const bounds = getVisibleViewBoxBounds();
        const qRadius = Math.ceil((bounds.maxX - bounds.minX) / tile.x + (bounds.maxY - bounds.minY) / tile.y) + primaryRadius;
        const rRadius = qRadius;

        for (let q = current.q - qRadius; q <= current.q + qRadius; q += 1) {
          for (let r = current.r - rRadius; r <= current.r + rRadius; r += 1) {
            const screenPlot = { q, r, ...plotToScreen(q, r) };
            if (isDiamondVisible(screenPlot.x, screenPlot.y, bounds, renderPadding)) visiblePlots.push(screenPlot);
          }
        }

        visiblePlots
          .sort((a, b) => a.y - b.y)
          .forEach(({ q, r, x, y }) => {
            const plotGroup = createSvgElement("g", { class: "plot-group" });
            const isCurrent = q === current.q && r === current.r;
            const plot = createSvgElement("polygon", {
              points: diamondPoints(x, y),
              class: `${isPrimaryPlot(q, r) ? "plot" : "plot plot-outer"}${isCurrent ? " plot-current" : ""}`,
              tabindex: "0",
              role: "button",
              "aria-label": isCurrent ? `Current plot ${q}, ${r}` : `Move to plot ${q}, ${r}`,
            });
            const label = createSvgElement("text", {
              class: isPrimaryPlot(q, r) ? "plot-label" : "plot-label plot-label-outer",
              x,
              y: y + 8,
              transform: `rotate(-26.565 ${x} ${y + 8})`,
              "aria-hidden": "true",
            });
            label.textContent = `${q},${r}`;

            plot.addEventListener("click", () => moveTo(q, r));
            plot.addEventListener("keydown", (event) => {
              if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                moveTo(q, r);
              }
            });

            plotGroup.appendChild(plot);
            plotGroup.appendChild(label);
            const illustration = plotIllustrations.get(plotKey(q, r));
            if (illustration && isArtworkFullyVisible(x, y, bounds)) appendIllustration(plotGroup, illustration, x, y);
            grid.appendChild(plotGroup);
          });
      }

      renderGrid();
      window.addEventListener("resize", renderGrid);
    </script>
  </body>
</html>
