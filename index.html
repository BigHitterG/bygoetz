<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>By Goetz — Isometric Grid</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="world" aria-label="Interactive centered isometric plot grid">
      <svg
        class="iso-world"
        viewBox="0 0 1600 1000"
        role="application"
        aria-labelledby="iso-title iso-desc"
        preserveAspectRatio="xMidYMid slice"
      >
        <title id="iso-title">Centered isometric plot grid</title>
        <desc id="iso-desc">
          A minimal isometric grid where clicking a neighboring plot shifts that plot into the center of the screen.
        </desc>
        <rect class="canvas" width="1600" height="1000" />
        <g id="grid" class="grid"></g>
      </svg>
    </main>

    <script>
      const grid = document.querySelector("#grid");
      const center = { x: 800, y: 500 };
      const tile = { x: 184, y: 92 };
      const radius = 6;
      let current = { q: 0, r: 0 };

      function plotToScreen(q, r) {
        return {
          x: center.x + (q - current.q - (r - current.r)) * (tile.x / 2),
          y: center.y + (q - current.q + (r - current.r)) * (tile.y / 2),
        };
      }

      function diamondPoints(x, y) {
        return `${x},${y - tile.y / 2} ${x + tile.x / 2},${y} ${x},${y + tile.y / 2} ${x - tile.x / 2},${y}`;
      }

      function moveTo(q, r) {
        current = { q, r };
        renderGrid();
      }

      function renderGrid() {
        grid.replaceChildren();

        for (let q = current.q - radius; q <= current.q + radius; q += 1) {
          for (let r = current.r - radius; r <= current.r + radius; r += 1) {
            const { x, y } = plotToScreen(q, r);
            if (x < -tile.x || x > 1600 + tile.x || y < -tile.y || y > 1000 + tile.y) continue;

            const plot = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
            plot.setAttribute("points", diamondPoints(x, y));
            plot.setAttribute("class", q === current.q && r === current.r ? "plot plot-current" : "plot");
            plot.setAttribute("tabindex", "0");
            plot.setAttribute("role", "button");
            plot.setAttribute("aria-label", q === current.q && r === current.r ? "Current plot" : "Move to this plot");
            plot.addEventListener("click", () => moveTo(q, r));
            plot.addEventListener("keydown", (event) => {
              if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                moveTo(q, r);
              }
            });
            grid.appendChild(plot);
          }
        }
      }

      renderGrid();
    </script>
  </body>
</html>
