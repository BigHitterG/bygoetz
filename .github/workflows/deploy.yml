name: Deploy Next.js site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/configure-pages@v5
      - name: Ensure Pages source is GitHub Actions
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          pages_api="https://api.github.com/repos/${REPOSITORY}/pages"
          headers=(
            -H "Accept: application/vnd.github+json"
            -H "Authorization: Bearer ${GITHUB_TOKEN}"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )

          status="$(curl -sS -o /tmp/pages.json -w '%{http_code}' "${headers[@]}" "${pages_api}")"
          if [ "${status}" = "200" ]; then
            update_status="$(curl -sS -L -X PUT "${headers[@]}" "${pages_api}" \
              -d '{"build_type":"workflow"}' \
              -o /tmp/pages-update.json \
              -w '%{http_code}')"
            if [ "${update_status}" != "204" ]; then
              cat /tmp/pages-update.json
              echo "Unable to update Pages source to GitHub Actions (HTTP ${update_status})."
              exit 1
            fi
            echo "Updated Pages source to GitHub Actions."
          elif [ "${status}" = "404" ]; then
            create_status="$(curl -sS -L -X POST "${headers[@]}" "${pages_api}" \
              -d '{"build_type":"workflow"}' \
              -o /tmp/pages-create.json \
              -w '%{http_code}')"
            if [ "${create_status}" != "201" ]; then
              cat /tmp/pages-create.json
              echo "Unable to create GitHub Actions Pages site (HTTP ${create_status})."
              exit 1
            fi
            echo "Created GitHub Actions Pages site."
          else
            cat /tmp/pages.json
            echo "Unable to inspect GitHub Pages configuration (HTTP ${status})."
            exit 1
          fi
      - run: npm ci
      - run: npm run build
      - run: test -f out/index.html
      - run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
