<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
<title id="title">Three framed Explorers prints on a softly textured wall</title>
<desc id="desc">A natural wood triptych with white mats and the Monkey, Explorer, and Turtle artworks.</desc>
<defs>
 <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#f5f0e7"/><stop offset="1" stop-color="#e5ddd0"/></linearGradient>
 <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#c8975f"/><stop offset=".45" stop-color="#e5bf86"/><stop offset="1" stop-color="#a97845"/></linearGradient>
 <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%"><feGaussianBlur in="SourceAlpha" stdDeviation="12"/><feOffset dy="16"/><feComponentTransfer><feFuncA type="linear" slope=".28"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
 <filter id="soft"><feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" seed="4" result="noise"/><feColorMatrix in="noise" type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 .035"/></feComponentTransfer><feBlend in="SourceGraphic" mode="multiply"/></filter>
</defs>
<rect width="1200" height="820" fill="url(#wall)"/>
<rect width="1200" height="820" filter="url(#soft)" opacity=".65" fill="#fff"/>
<path d="M0 720H1200" stroke="#d4c8b7" stroke-width="6"/>
<path d="M0 725H1200" stroke="#f8f3eb" stroke-width="3"/>
<g filter="url(#shadow)">
 <g transform="translate(170 150)">
  <rect width="230" height="320" rx="3" fill="url(#wood)"/>
  <rect x="11" y="11" width="208" height="298" fill="#f8f5ee" stroke="#8b643b" stroke-width="2"/>
  <rect x="31" y="31" width="168" height="258" fill="#fff" stroke="#e9e0d2" stroke-width="3"/>
  <image x="44" y="45" width="142" height="230" preserveAspectRatio="xMidYMid meet" xlink:href="/explorers/Monkey.png"/>
 </g>
 <g transform="translate(485 150)">
  <rect width="230" height="320" rx="3" fill="url(#wood)"/>
  <rect x="11" y="11" width="208" height="298" fill="#f8f5ee" stroke="#8b643b" stroke-width="2"/>
  <rect x="31" y="31" width="168" height="258" fill="#fff" stroke="#e9e0d2" stroke-width="3"/>
  <image x="44" y="45" width="142" height="230" preserveAspectRatio="xMidYMid meet" xlink:href="/explorers/Explorer.png"/>
 </g>
 <g transform="translate(800 150)">
  <rect width="230" height="320" rx="3" fill="url(#wood)"/>
  <rect x="11" y="11" width="208" height="298" fill="#f8f5ee" stroke="#8b643b" stroke-width="2"/>
  <rect x="31" y="31" width="168" height="258" fill="#fff" stroke="#e9e0d2" stroke-width="3"/>
  <image x="44" y="45" width="142" height="230" preserveAspectRatio="xMidYMid meet" xlink:href="/explorers/Turtle.png"/>
 </g>
</g>
</svg>